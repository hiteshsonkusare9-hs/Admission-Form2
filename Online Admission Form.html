<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Form · Enjoy Computer Institute</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b3b5c 0%, #1b5a7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      max-width: 850px;
      width: 100%;
      background: #f0f8ff;  /* light blue background */
      border-radius: 30px;
      box-shadow: 0 25px 40px rgba(0, 20, 40, 0.5);
      overflow: hidden;
      border: 2px solid #ffd966; /* golden border */
    }

    .header {
      background: #1e4a6d; /* deep blue */
      color: #ffd966;      /* golden text */
      padding: 25px 30px;
      text-align: center;
      border-bottom: 4px solid #ffbf00;
    }

    .header h1 {
      font-size: 2.4rem;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 #0b2a3b;
    }

    .header p {
      font-size: 1rem;
      color: #e6f0fa;
      line-height: 1.6;
    }

    .header .contact {
      margin-top: 12px;
      font-weight: 500;
      background: rgba(255, 215, 0, 0.15);
      padding: 8px 15px;
      display: inline-block;
      border-radius: 50px;
      color: #ffdb7c;
    }

    /* Form */
    .form-body {
      padding: 35px 40px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1 1 calc(50% - 10px);
      min-width: 240px;
    }

    .form-group.full-width {
      flex: 1 1 100%;
    }

    label {
      display: block;
      font-weight: 600;
      color: #1e4a6d;
      margin-bottom: 6px;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
    }

    label i {
      color: #cc9a00;
      margin-right: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #b3d9f0;
      border-radius: 14px;
      font-size: 1rem;
      background: white;
      transition: 0.2s;
      outline: none;
      color: #0a3144;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #ffbf00;
      box-shadow: 0 0 0 4px rgba(255, 191, 0, 0.2);
    }

    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center;
      background: #e7f2fa;
      padding: 8px 16px;
      border-radius: 40px;
      border: 2px solid #b3d9f0;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      color: #1e4a6d;
      margin-bottom: 0;
      cursor: pointer;
    }

    .radio-group input[type="radio"] {
      width: auto;
      accent-color: #ffbf00;
      transform: scale(1.1);
    }

    button {
      background: #1e4a6d; /* deep blue */
      color: white;
      border: none;
      padding: 16px 30px;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      border-bottom: 5px solid #b37b00;
      letter-spacing: 1px;
      box-shadow: 0 8px 0 #0e2a3b;
      margin-top: 15px;
    }

    button:hover {
      background: #256f9c;
      border-bottom-color: #e6a800;
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #0e2a3b;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0e2a3b;
      border-bottom-color: #cc9a00;
    }

    .message {
      text-align: center;
      margin-top: 25px;
      font-weight: 600;
      padding: 12px;
      border-radius: 50px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #0c4b33;
      border: 2px solid #ffbf00;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #ff8080;
      display: block;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      color: #1e4a6d;
      font-weight: 500;
      opacity: 0.8;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .form-body { padding: 20px; }
      .form-group { flex: 1 1 100%; }
      .header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="header">
      <h1>🎓 ENJOY COMPUTER INSTITUTE</h1>
      <p>31/32, Subhash Nagar, Near Sangam Band, Beside Bank of Baroda, Limbayat, Surat, Gujarat-394210</p>
      <div class="contact">📞 Hitesh Sonkusare: 9662574077 &nbsp; | &nbsp; 📞 Lalit Sonar: 9913499700</div>
    </div>

    <div class="form-body">
      <form id="admissionForm">
        <div class="form-row">
          <div class="form-group">
            <label><i>👤</i> Student Full Name *</label>
            <input type="text" name="fullName" placeholder="e.g. Rahul Sharma" required>
          </div>
          <div class="form-group">
            <label><i>🎓</i> Qualification *</label>
            <select name="qualification" required>
              <option value="">-- Select --</option>
              <option value="10th">10th</option>
              <option value="12th">12th</option>
              <option value="Graduate">Graduate</option>
              <option value="Post Graduate">Post Graduate</option>
              <option value="Diploma">Diploma</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i>⚥</i> Gender *</label>
            <div class="radio-group">
              <label><input type="radio" name="gender" value="Male" required> Male</label>
              <label><input type="radio" name="gender" value="Female"> Female</label>
              <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>
          </div>
          <div class="form-group">
            <label><i>📅</i> Date of Birth *</label>
            <input type="date" name="dob" required>
          </div>
        </div>

        <div class="form-group full-width">
          <label><i>🏠</i> Address *</label>
          <textarea name="address" rows="2" placeholder="Street, city, pin code..." required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i>📞</i> Contact No. *</label>
            <input type="tel" name="contact" placeholder="10-digit mobile" pattern="[0-9]{10}" maxlength="10" required>
          </div>
          <div class="form-group">
            <label><i>📱</i> WhatsApp No.</label>
            <input type="tel" name="whatsapp" placeholder="Same or different" pattern="[0-9]{10}" maxlength="10">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><i>💻</i> Course *</label>
            <input type="text" name="course" placeholder="e.g. Basic Computer, Tally, Programming" required>
          </div>
          <div class="form-group">
            <label><i>⏰</i> Batch Time *</label>
            <select name="batchTime" required>
              <option value="">-- Select --</option>
              <option value="Morning (8-10 AM)">Morning (8-10 AM)</option>
              <option value="Morning (10-12 PM)">Morning (10-12 PM)</option>
              <option value="Afternoon (12-2 PM)">Afternoon (12-2 PM)</option>
              <option value="Afternoon (2-4 PM)">Afternoon (2-4 PM)</option>
              <option value="Evening (4-6 PM)">Evening (4-6 PM)</option>
              <option value="Evening (6-8 PM)">Evening (6-8 PM)</option>
            </select>
          </div>
        </div>

        <button type="submit">📋 SUBMIT ADMISSION</button>
        <div id="formMessage" class="message"></div>
        <div class="footer-note">All fields marked * are required</div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('admissionForm');
    const messageDiv = document.getElementById('formMessage');

    // 👇 REPLACE WITH YOUR ACTUAL WEB APP URL FROM GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxSN2jUx00w-fS9FieYLwlxvlJ7Pv3FGA_ZHHGjI0uosd0G1c_kOfSfE4N2H3eQmimH/exec';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();  // Prevent traditional form submission

      // Disable button to avoid double submission
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerText = 'Submitting...';

      // Collect form data into an object
      const formData = new FormData(form);
      const data = {
        fullName: formData.get('fullName'),
        qualification: formData.get('qualification'),
        gender: formData.get('gender'),
        dob: formData.get('dob'),
        address: formData.get('address'),
        contact: formData.get('contact'),
        whatsapp: formData.get('whatsapp') || '', // optional
        course: formData.get('course'),
        batchTime: formData.get('batchTime')
      };

      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.result === 'success') {
          messageDiv.className = 'message success';
          messageDiv.innerText = '✅ Admission submitted successfully! We will contact you soon.';
          form.reset();  // Clear form
        } else {
          messageDiv.className = 'message error';
          messageDiv.innerText = '❌ Submission failed. Please try again or contact institute.';
        }
      } catch (error) {
        console.error(error);
        messageDiv.className = 'message error';
        messageDiv.innerText = '❌ Network error. Check connection or script URL.';
      } finally {
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.innerText = '📋 SUBMIT ADMISSION';
        // Auto-hide message after 5 seconds
        setTimeout(() => {
          messageDiv.style.display = 'none';
          messageDiv.className = 'message';
        }, 5000);
      }
    });
  </script>
</body>
</html>
